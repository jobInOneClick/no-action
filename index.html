<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Jobs Closed</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: Arial, sans-serif;
    }

    body{
      background:#f3f4f6;
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      padding:20px;
    }

    .box{
      background:#fff;
      width:100%;
      max-width:700px;
      padding:50px 35px;
      border-radius:16px;
      text-align:center;
      box-shadow:0 5px 20px rgba(0,0,0,0.08);
    }

    .icon{
      width:80px;
      height:80px;
      background:#2563eb;
      color:#fff;
      border-radius:50%;
      display:flex;
      justify-content:center;
      align-items:center;
      font-size:35px;
      margin:0 auto 25px;
    }

    h1{
      font-size:36px;
      color:#111827;
      margin-bottom:20px;
    }

    p{
      color:#4b5563;
      font-size:17px;
      line-height:1.8;
    }

    @media(max-width:600px){

      .box{
        padding:40px 20px;
      }

      h1{
        font-size:28px;
      }

      p{
        font-size:15px;
      }

    }

  </style>

</head>

<body>

  <div class="box">

    <div class="icon">
      ✓
    </div>

    <h1>All Positions Filled</h1>

    <p>
      All current job openings have been filled successfully.
      New openings will be available soon.
    </p>

  </div>

</body>
   
</html>
